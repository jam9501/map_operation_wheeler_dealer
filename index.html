<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
window.addEventListener("DOMContentLoaded", async () => {
  try {

    const DATA = {/* your DATA object stays EXACTLY the same */};
    const FIPS = {/* your FIPS object stays EXACTLY the same */};

    const RAMP = ['#FEF0D9','#FDD49E','#FDBB84','#FC8D59','#E34A33','#B30000'];

    let mode = 'dollars', colorScale, allPaths;

    function fmt$(v){
      return v>=1e9?'$'+(v/1e9).toFixed(2)+'B'
        :v>=1e6?'$'+(v/1e6).toFixed(1)+'M'
        :'$'+(v/1e3).toFixed(0)+'K';
    }
    function fmtN(v){ return v.toLocaleString(); }

    function getVal(row){
      if(mode==='dollars') return row.denied_dollars;
      if(mode==='rate') return row.denial_rate;
      return row.dollar_denial_pct;
    }

    function buildScale(){
      const vals = Object.values(DATA).map(getVal);
      return d3.scaleQuantize([0, Math.max(...vals)], RAMP);
    }

    function updateLegend(){
      const vals = Object.values(DATA).map(getVal);
      const lo = Math.min(...vals), hi = Math.max(...vals);

      document.getElementById('leg-lo').textContent =
        mode==='dollars' ? fmt$(lo) : lo.toFixed(1)+'%';

      document.getElementById('leg-hi').textContent =
        mode==='dollars' ? fmt$(hi) : hi.toFixed(1)+'%';

      document.getElementById('leg-swatches').innerHTML =
        RAMP.map(c => `<div class="legend-swatch" style="background:${c}"></div>`).join('');
    }

    window.setMode = function(m){
      mode = m;

      ['dollars','rate','dollar_pct'].forEach(id => {
        const btn = document.getElementById('btn-'+id);
        const active = id === m;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active);
      });

      colorScale = buildScale();

      if(allPaths){
        allPaths.attr('fill', d => {
          const ab = FIPS[String(d.id).padStart(2,'0')];
          const row = DATA[ab];
          return row ? colorScale(getVal(row)) : '#e8e5dc';
        });
      }

      updateLegend();
    }

    const svg = d3.select("#map");

    const us = await d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json");
    const states = topojson.feature(us, us.objects.states).features;

    const projection = d3.geoAlbersUsa().scale(1200).translate([480,270]);
    const path = d3.geoPath(projection);

    colorScale = buildScale();

    allPaths = svg.selectAll("path")
      .data(states)
      .join("path")
      .attr("class","state")
      .attr("d", path)
      .attr("stroke","#fff")
      .attr("stroke-width",0.6)
      .attr("fill", d => {
        const ab = FIPS[String(d.id).padStart(2,'0')];
        const row = DATA[ab];
        return row ? colorScale(row.denied_dollars) : "#e8e5dc";
      })
      .on("mousemove", (event,d) => {
        const ab = FIPS[String(d.id).padStart(2,'0')];
        const row = DATA[ab];
        if(!row) return;

        const tt = document.getElementById("tooltip");
        document.getElementById("tt-name").textContent = row.name;
        document.getElementById("tt-dd").textContent = fmt$(row.denied_dollars);
        document.getElementById("tt-rate").textContent = row.denial_rate + "%";

        tt.style.display = "block";
        tt.style.left = (event.clientX + 15) + "px";
        tt.style.top = (event.clientY - 10) + "px";
      })
      .on("mouseleave", () => {
        document.getElementById("tooltip").style.display = "none";
      });

    updateLegend();

  } catch (err) {
    console.error("Map failed to load:", err);
  }
});
</script>
